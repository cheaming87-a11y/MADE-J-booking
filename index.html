<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="MADE J">
    <meta name="theme-color" content="#f5f5f7">
    <title>MADE J Booking</title>
    <link rel="stylesheet" href="styles.css?v=20260520-7">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script defer src="supabase-config.js"></script>
    <script defer src="admin.js?v=20260518-1"></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">MADE J</p>
          <h1 id="screenTitle">예약 관리</h1>
        </div>
        <button id="logoutButton" class="icon-button hidden" type="button">로그아웃</button>
      </header>

      <section id="loginPanel" class="auth-card">
        <div class="auth-intro">
          <h2>원장님 로그인</h2>
          <p>예약과 고객 정보를 관리합니다.</p>
        </div>
        <div class="field">
          <label for="adminEmail">이메일</label>
          <input id="adminEmail" type="email" placeholder="name@example.com" autocomplete="email" inputmode="email">
        </div>
        <div class="field">
          <label for="adminPassword">비밀번호</label>
          <input id="adminPassword" type="password" placeholder="비밀번호" autocomplete="current-password">
        </div>
        <button id="loginButton" class="primary-button" type="button">로그인</button>
        <p id="loginMessage" class="message" role="status"></p>
      </section>

      <section id="adminPanel" class="workspace hidden">
        <nav class="tabs" aria-label="화면 선택">
          <button id="calendarTabButton" class="tab-button active" type="button">캘린더</button>
          <button id="customerTabButton" class="tab-button" type="button">고객 DB</button>
        </nav>

        <section id="calendarView" class="view-stack">
          <section class="sheet">
            <div class="calendar-header">
              <div>
                <h2 id="calendarTitle">월별 캘린더</h2>
                <p id="calendarMessage">날짜 선택 · 좌우 스와이프로 월 이동</p>
              </div>
            </div>
            <div class="dashboard-strip" aria-label="예약 대시보드">
              <div>
                <span>전체</span>
                <strong id="totalCompletedCount">0건</strong>
              </div>
              <div>
                <span>완료</span>
                <strong id="monthCompletedCount">0건</strong>
              </div>
              <div>
                <span>대기</span>
                <strong id="activeBookingCount">0건</strong>
              </div>
            </div>
            <div class="calendar-weekdays" aria-hidden="true">
              <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
            </div>
            <div id="calendarGrid" class="calendar-grid"></div>
          </section>
        </section>

        <section id="bookingView" class="view-stack hidden">
          <section class="date-strip" aria-label="예약 조회 날짜">
            <button id="backToCalendarButton" class="text-button" type="button">캘린더</button>
            <div>
              <label for="filterDate">선택 날짜</label>
              <input id="filterDate" type="date">
            </div>
            <button id="refreshButton" class="text-button" type="button">새로고침</button>
          </section>

          <div class="booking-pager" id="bookingPager">
            <div class="pager-indicator" aria-label="예약 화면">
              <span id="bookingFormDot" class="active">예약등록</span>
              <span id="bookingListDot">예약목록</span>
            </div>
            <div id="bookingPanels" class="booking-panels">
              <section class="sheet booking-page">
                <div class="section-title">
                  <h2>예약 등록</h2>
                  <p>고객명과 연락처가 기존 고객과 같으면 자동으로 고객 DB에 합쳐집니다.</p>
                </div>
                <form id="ownerBookingForm" autocomplete="on">
                  <div class="field-row">
                    <div class="field">
                      <label for="bookingDate">날짜</label>
                      <input id="bookingDate" name="bookingDate" type="date" required>
                    </div>
                    <div class="field">
                      <label for="bookingTime">시간</label>
                      <input id="bookingTime" name="bookingTime" type="time" min="09:00" max="22:00" step="600" required>
                    </div>
                  </div>

                  <div class="field-row">
                    <div class="field">
                      <label for="customerName">고객명</label>
                      <input id="customerName" name="customerName" type="text" placeholder="고객 이름" required>
                    </div>
                    <div class="field">
                      <label for="phone">연락처</label>
                      <input id="phone" name="phone" type="tel" placeholder="010-0000-0000" inputmode="tel">
                    </div>
                  </div>
                  <div id="bookingCustomerLookup" class="lookup-panel hidden">
                    <p id="bookingCustomerMessage">고객명을 입력하면 고객DB를 먼저 확인합니다.</p>
                    <div id="bookingCustomerResults" class="lookup-results"></div>
                    <button id="newBookingCustomerButton" class="mini-button" type="button">신규 고객으로 등록</button>
                  </div>

                  <div class="field">
                    <label for="servicePicker">시술 종류</label>
                    <select id="servicePicker" name="servicePicker" required></select>
                  </div>

                  <div class="field">
                    <label for="note">메모</label>
                    <textarea id="note" name="note" rows="3" placeholder="시술 내용, 특이사항, 결제 메모"></textarea>
                  </div>

                  <button id="saveBookingButton" class="primary-button" type="submit">예약 저장</button>
                  <p id="formMessage" class="message" role="status"></p>
                </form>
              </section>
              <section class="sheet booking-page">
                <div class="section-title">
                  <h2>예약 목록</h2>
                  <p id="adminMessage" role="status">예약 목록을 불러오세요.</p>
                </div>
                <div id="bookingRows" class="booking-list"></div>
              </section>
            </div>
          </div>
        </section>

        <section id="customerView" class="view-stack hidden">
          <section class="sheet">
            <div class="section-title">
              <h2>고객 DB</h2>
              <p id="customerMessage" role="status">이름이나 연락처로 검색하세요.</p>
            </div>
            <div class="field">
              <label for="customerSearch">고객 검색</label>
              <input id="customerSearch" type="search" placeholder="고객명 또는 전화번호" autocomplete="off">
            </div>
            <div id="customerRows" class="compact-list"></div>
          </section>
        </section>
      </section>
    </main>
    <section id="moveDialog" class="modal hidden" aria-label="예약변경">
      <div class="modal-backdrop" data-action="close-move"></div>
      <div class="modal-sheet" role="dialog" aria-modal="true">
        <div class="modal-heading">
          <div>
            <p>예약변경</p>
            <h2 id="moveTitle">날짜와 시간 선택</h2>
          </div>
          <button id="closeMoveButton" class="text-button" type="button">닫기</button>
        </div>
        <div class="move-calendar-header">
          <button id="movePrevMonthButton" class="text-button" type="button">이전</button>
          <strong id="moveCalendarTitle">월별 캘린더</strong>
          <button id="moveNextMonthButton" class="text-button" type="button">다음</button>
        </div>
        <div class="calendar-weekdays" aria-hidden="true">
          <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
        </div>
        <div id="moveCalendarGrid" class="calendar-grid move-calendar-grid"></div>
        <div class="field">
          <label for="moveTime">변경 시간</label>
          <input id="moveTime" type="time" min="09:00" max="22:00" step="600">
        </div>
        <p id="moveMessage" class="message" role="status"></p>
        <button id="saveMoveButton" class="primary-button" type="button">변경 완료</button>
      </div>
    </section>
    <section id="customerDialog" class="modal hidden" aria-label="고객 수정">
      <div class="modal-backdrop" data-action="close-customer"></div>
      <div class="modal-sheet compact-modal" role="dialog" aria-modal="true">
        <div class="modal-heading">
          <div>
            <p>고객 DB</p>
            <h2 id="customerEditTitle">고객 수정</h2>
          </div>
          <button id="closeCustomerButton" class="text-button" type="button">닫기</button>
        </div>
        <div class="field">
          <label for="editCustomerName">고객명</label>
          <input id="editCustomerName" type="text" autocomplete="name">
        </div>
        <div class="field">
          <label for="editCustomerPhone">연락처</label>
          <input id="editCustomerPhone" type="tel" inputmode="tel" autocomplete="tel">
        </div>
        <p id="customerEditMessage" class="message" role="status"></p>
        <button id="saveCustomerButton" class="primary-button" type="button">수정 완료</button>
      </div>
    </section>
  </body>
</html>
